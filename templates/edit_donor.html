<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ویرایش داوطلب</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'MyFont';
            src: url('/static/fonts/SFArabic-Medium.ttf') format('truetype');
        }

        * {
            font-family: 'MyFont', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .edit-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 500px;
        }

        .form-control,
        .form-select {
            border-radius: 10px !important;
            padding: 12px !important;
        }

        .btn-primary {
            background-color: #5b86e5 !important;
            border: none !important;
            border-radius: 10px !important;
            padding: 12px !important;
        }
    </style>
</head>

<body>

    <div class="edit-box">
        <h4 class="text-center text-secondary mb-4">ویرایش اطلاعات داوطلب</h4>

        <!-- اطلاعات قبلی داخل value="" قرار می‌گیرند -->
        <form action="/update_donor/{{ donor['id'] }}" method="POST">
            <div class="mb-3">
                <label>نام و نام خانوادگی</label>
                <input type="text" name="name" class="form-control" value="{{ donor['name'] }}" required>
            </div>
            <div class="mb-3">
                <label>گروه خونی</label>
                <select name="blood_type" class="form-select" required>
                    <option value="A+" {% if donor['blood_type']=='A+' %}selected{% endif %}>A+</option>
                    <option value="A-" {% if donor['blood_type']=='A-' %}selected{% endif %}>A-</option>
                    <option value="B+" {% if donor['blood_type']=='B+' %}selected{% endif %}>B+</option>
                    <option value="B-" {% if donor['blood_type']=='B-' %}selected{% endif %}>B-</option>
                    <option value="AB+" {% if donor['blood_type']=='AB+' %}selected{% endif %}>AB+</option>
                    <option value="AB-" {% if donor['blood_type']=='AB-' %}selected{% endif %}>AB-</option>
                    <option value="O+" {% if donor['blood_type']=='O+' %}selected{% endif %}>O+</option>
                    <option value="O-" {% if donor['blood_type']=='O-' %}selected{% endif %}>O-</option>
                </select>
            </div>
            <div class="mb-3">
                <label>شهر</label>
                <input type="text" name="city" class="form-control" value="{{ donor['city'] }}" required>
            </div>
            <div class="mb-3">
                <label>شماره تماس</label>
                <input type="text" name="phone" class="form-control" value="{{ donor['phone'] }}" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">ذخیره تغییرات</button>
            <a href="/hospital/manage_donors" class="btn btn-outline-secondary w-100 mt-2">انصراف و بازگشت</a>
        </form>
    </div>

</body>

</html>
