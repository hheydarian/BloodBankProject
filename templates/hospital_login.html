<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود بیمارستان</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'MyFont';
            src: url('/static/fonts/SFArabic-Medium.ttf') format('truetype');
        }

        * {
            font-family: 'MyFont', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 400px;
        }

        .form-control {
            border-radius: 10px !important;
            padding: 12px !important;
        }

        .btn-primary {
            background-color: #5b86e5 !important;
            border: none !important;
            border-radius: 10px !important;
            padding: 12px !important;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="login-box text-center">
        <h3 class="mb-4 text-secondary">بیمارستان / مرکز درمانی</h3>
        <p class="text-muted mb-4" style="font-size:0.9rem;">لطفاً رمز عبور اختصاصی را وارد کنید</p>

        <form action="/hospital/dashboard" method="POST">
            <input type="password" name="password" class="form-control mb-3" placeholder="رمز عبور..." required> <button
                type="submit" class="btn btn-primary w-100">ورود به پنل مدیریت</button>
            {% if error %}
            <div class="error-msg" style="display: block !important;">رمز عبور اشتباه است!</div>
            {% endif %}
        </form>
        <a href="/" class="text-muted mt-3 d-inline-block" style="font-size:0.85rem; text-decoration:none;">بازگشت به
            صفحه اصلی</a>
    </div>

</body>

</html>
