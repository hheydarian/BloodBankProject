<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام داوطلب اهدای خون</title>

    <!-- بوت‌استرپ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <!-- فراخوانی مستقیم فونت شما -->
    <style>
        @font-face {
            font-family: 'MyCustomFont';
            src: url('/static/fonts/SFArabic-Medium.ttf') format('truetype');
        }

        * {
            font-family: 'MyCustomFont', sans-serif !important;
        }

        body {
            background-color: #f4f6f9;
        }

        .card {
            border-radius: 16px !important;
            border: none !important;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.07) !important;
            margin-top: 50px;
        }

        .card-header {
            background-color: #ffffff !important;
            color: #333 !important;
            border-bottom: 1px solid #eee !important;
            padding: 25px !important;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .form-control,
        .form-select {
            border: 1px solid #ddd !important;
            border-radius: 10px !important;
            padding: 12px !important;
            height: 50px !important;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #e74c3c !important;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.15) !important;
        }

        label {
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }

        .btn-danger {
            background-color: #e74c3c !important;
            border: none !important;
            border-radius: 10px !important;
            padding: 14px !important;
            font-size: 1.1rem !important;
            font-weight: bold !important;
            height: 55px !important;
        }

        .btn-danger:hover {
            background-color: #c0392b !important;
        }

        .navbar {
            background-color: #fff !important;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05) !important;
        }

        .navbar-brand {
            color: #e74c3c !important;
            font-weight: 800 !important;
        }

        .nav-link {
            color: #333 !important;
            font-weight: 600 !important;
        }
    </style>
</head>

<body>

    <!-- منوی مخصوص کاربران عادی (داوطلبان) -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">🩸 سامانه اهدای خون</a>
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">صفحه اصلی</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="/donor/register">ثبت‌نام داوطلب</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- فرم -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">ثبت‌نام داوطلب اهدای خون</div>
                    <div class="card-body p-4">
                        <form action="/submit_donor" method="POST">
                            <div class="mb-3">
                                <label>نام و نام خانوادگی</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>گروه خونی</label>
                                <select name="blood_type" class="form-select" required>
                                    <option value="">انتخاب کنید...</option>
                                    <option>A+</option>
                                    <option>A-</option>
                                    <option>B+</option>
                                    <option>B-</option>
                                    <option>AB+</option>
                                    <option>AB-</option>
                                    <option>O+</option>
                                    <option>O-</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>شهر</label>
                                <input type="text" name="city" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>شماره تماس</label>
                                <input type="text" name="phone" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 mt-3">ثبت در سامانه</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
