<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ثبت‌نام داوطلب اهدای خون</title>
    <!-- اضافه کردن بوت‌استرپ برای زیبایی سایت -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white text-center">
                <h4>فرم ثبت‌نام داوطلب اهدای خون</h4>
            </div>
            <div class="card-body">
                <!-- فرم که اطلاعات را به آدرس /submit_donor می‌فرستد -->
                <form action="/submit_donor" method="POST">
                    <div class="mb-3">
                        <label>نام و نام خانوادگی</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>گروه خونی</label>
                        <select name="blood_type" class="form-select" required>
                            <option value="">انتخاب کنید...</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>شهر</label>
                        <input type="text" name="city" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>شماره تماس</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">ثبت در سامانه</button>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
