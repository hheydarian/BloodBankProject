<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه هوشمند اهدای خون</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'MyFont';
            src: url('/static/fonts/SFArabic-Medium.ttf') format('truetype');
        }

        * {
            font-family: 'MyFont', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .hero-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 90%;
            transform: translateY(0px);
            transition: transform 0.5s ease;
        }

        .hero-box:hover {
            transform: translateY(-10px);
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }

        .hero-subtitle {
            font-size: 1.2rem;
            margin-bottom: 50px;
            color: #e0e0e0;
        }

        .btn-3d {
            display: inline-block;
            padding: 20px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            border-radius: 15px;
            text-decoration: none;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-donor {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border-bottom: 8px solid #c0392b;
        }

        .btn-donor:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 65, 108, 0.4);
            color: white;
        }

        .btn-donor:active {
            transform: translateY(2px);
            border-bottom-width: 3px;
        }

        .btn-hospital {
            background: linear-gradient(45deg, #36d1dc, #5b86e5);
            border-bottom: 8px solid #2c6fbb;
        }

        .btn-hospital:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(54, 209, 220, 0.4);
            color: white;
        }

        .btn-hospital:active {
            transform: translateY(2px);
            border-bottom-width: 3px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <div class="hero-box">
        <div class="hero-title">🩸 سامانه هوشمند اهدای خون</div>
        <p class="hero-subtitle">پلی ماندگار بین نیازمندان و داوطلبان حیات‌بخش</p>

        <div>
            <a href="/donor/register" class="btn-3d btn-donor">قلبم می‌تپد برای کمک (داوطلب)</a>
            <a href="/hospital/login" class="btn-3d btn-hospital">پنل بیمارستان‌ها</a>
        </div>

        <div class="features">
            <div class="feature-item">⚡ تطبیق هوشمند گروه خونی</div>
            <div class="feature-item">📍 جستجو بر اساس شهر</div>
            <div class="feature-item">📱 ارسال نوتیفیکیشن اضطراری</div>
        </div>
    </div>

</body>

</html>
